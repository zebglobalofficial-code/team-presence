function timeAgo(iso) {
  if (!iso) return null;
  const diff = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (diff < 60) return "Just now";
  if (diff < 3600) return Math.floor(diff/60)+"m ago";
  if (diff < 86400) return Math.floor(diff/3600)+"h ago";

  return String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0")+" "+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
}
function toKey(d) {

}
function getWeekStart(offset=0) {

function getWeekDays(ws) { return Array.from({length:5},(_,i)=>{ const d=new Date(ws); d.setDate(ws.getDate()+i); return d; }); }
function getMonthWeeks(md) {

  return weeks;
}

            )
          ),
          React.createElement("div",{style:{fontSize:13,fontWeight:800,color:"#64748b",marginBottom:8}},"NOTE / REASON"),
          React.createElement("textarea",{value:form.note,onChange:e=>setForm(f=>({...f,note:e.target.value})),placeholder:"e.g. Doctor appointment, client call...",style:{width:"100%",background:"#0f172a",border:"1px solid #334155",borderRadius:12,padding:"12px 14px",color:"#e2e8f0",fontSize:14,resize:"none",height:76,boxSizing:"border-box",outline:"none",marginBottom:18}}),
          React.createElement("div",{style:{display:"flex",gap:12}},
            React.createElement("button",{onClick:()=>setModal(null),style:{flex:1,padding:"13px",borderRadius:12,border:"1px solid #334155",background:"transparent",color:"#64748b",cursor:"pointer",fontWeight:700,fontSize:15}},"Cancel"),
            React.createElement("button",{onClick:saveModal,style:{flex:2,padding:"13px",borderRadius:12,border:"none",background:"linear-gradient(135deg,#818cf8,#38bdf8)",color:"#fff",cursor:"pointer",fontWeight:900,fontSize:16}},syncing?"Syncing...":"Save & Sync 🔥")
          )
        )
      );
    })()
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
