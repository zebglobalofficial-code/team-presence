const { useState, useEffect } = React;
firebase.initializeApp({ databaseURL: "https://team-presence-70858-default-rtdb.firebaseio.com" });

const STATUSES = {

  sick:        { label:"Sick Leave",   emoji:"🤒", color:"#ef4444", bg:"#fee2e2" },

  { id:"dhanasekar",     name:"Dhanasekar",     avatar:"DK", role:"Head" },

  { id:"swethavarshini", name:"Swethavarshini", avatar:"SW", role:"Lead" },
  { id:"hemalekha",      name:"Hemalekha",      avatar:"HL", role:"Team Member" },
  { id:"rithunya",       name:"Rithunya",       avatar:"RT", role:"Team Member" },
  { id:"dhivya",         name:"Dhivya",         avatar:"DH", role:"Team Member" },

const FULL_DAY_NAMES = ["Monday","Tuesday","Wednesday","Thursday","Friday"];

function toKey(d) { return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function getWeekStart(offset=0) {
  const t=new Date(),day=t.getDay(),diff=day===0?-6:1-day,m=new Date(t);
  m.setDate(t.getDate()+diff+offset*7); m.setHours(0,0,0,0); return m;
}
function getWeekDays(ws) { return Array.from({length:5},(_,i)=>{ const d=new Date(ws); d.setDate(ws.getDate()+i); return d; }); }
function getMonthWeeks(md) {
  const year=md.getFullYear(),month=md.getMonth(),firstDay=new Date(year,month,1),lastDay=new Date(year,month+1,0);
  const start=new Date(firstDay),sd=start.getDay();
  start.setDate(start.getDate()-(sd===0?6:sd-1));
  const weeks=[]; let cur=new Date(start);
  while(cur<=lastDay||weeks.length<4){ weeks.push(Array.from({length:7},(_,i)=>{ const d=new Date(cur); d.setDate(cur.getDate()+i); return d; })); cur.setDate(cur.getDate()+7); if(cur>lastDay&&weeks.length>=4) break; }
  return weeks;
}
function timeAgo(iso) {
  if(!iso) return null;
  const diff=Math.floor((Date.now()-new Date(iso))/1000);
  if(diff<60) return "Just now";
  if(diff<3600) return Math.floor(diff/60)+"m ago";
  if(diff<86400) return Math.floor(diff/3600)+"h ago";
  const d=new Date(iso);
  return String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0")+" "+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
}

    ref.on("value",(snap)=>{ const val=snap.val(); if(val) setPresence(val); setLoading(false); });
    return ()=>ref.off();

          React.createElement("div",{style:{width:44,height:44,borderRadius:"50%",background:GRADIENTS[i],display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:13,color:"#fff",flexShrink:0}},m.avatar),

            React.createElement("div",{style:{fontSize:12,color:"#64748b"}},m.role)

        React.createElement("button",{onClick:()=>{setWeekOffset(0);setMonthOffset(0);},style:{padding:"5px 12px",borderRadius:8,border:"1px solid #334155",background:"#1e293b",color:"#818cf8",cursor:"pointer",fontSize:13,fontWeight:700}},"Today"),
